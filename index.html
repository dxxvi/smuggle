<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smuggler</title>
  <style>
    .a { border: 1px solid #999; padding: 1rem; margin-top: 1rem }
    .a iframe { width: calc(100% - 3rem); height: 5rem }
  </style>
</head>
<body>
  <button id="run" onclick="createIframes()">Run</button>
  
  <script>
    function createIframes() {
      const N = 14;
      for (let i = 1; i <= N; i++) {
        // Create a div element
        const div = document.createElement('div');
        div.setAttribute('class', 'a');
        
        // Create an iframe element
        const iframe = document.createElement('iframe');
        iframe.src = `duck-${i}of${N}.txt`;
        
        // Append iframe to div
        div.appendChild(iframe);
        
        // Append div to body
        document.body.appendChild(div);
        
        // Wait for a random number of minutes (2-8)
        const randomMinutes = Math.floor(Math.random() * 7) + 2;
        const milliseconds = randomMinutes * 60 * 100;
        
        // Use setTimeout to wait
        setTimeout(() => {
          console.log(`Waited ${randomMinutes} minutes after creating iframe ${i}`);
        }, milliseconds);
      }
    }
  </script>
</body>
</html>
